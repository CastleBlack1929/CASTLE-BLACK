<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Acceso | Castle Black</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Serif:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style-login.css">
  <link rel="icon" href="img/logo-black.png" type="image/png">
  <link rel="apple-touch-icon" href="img/logo-black.png">
</head>
<body>
  <a class="back-btn" href="index.html">Inicio</a>

  <main class="login-hero login-hero--single">
    <section class="login-card">
      <div class="brand brand--solo">
        <img src="img/logo-black.png" alt="Logo Castle Black" class="logo logo--xl">
      </div>

      <form onsubmit="login(event)">
        <label class="field">
          <input type="text" id="username" placeholder="Tu usuario" required>
        </label>
        <label class="field">
          <input type="password" id="password" placeholder="Tu contraseña" required>
        </label>
        <button type="submit">Entrar al panel</button>
      </form>
      <p id="error-msg" aria-live="polite"></p>

      <div class="login-footer">
        <p class="help-title">¿Necesitas ayuda con el acceso?</p>
        <p class="help-meta">
          Correo:
          <a class="help-link" href="mailto:castleblack.inc@gmail.com?subject=Soporte%20de%20acceso%20al%20panel%20(Castle%20Black)&body=Hola%20Castle%20Black.%0A%0ANecesito%20ayuda%20para%20recuperar%20el%20acceso%20al%20panel%20(olvid%C3%A9%20mi%20usuario%20y%2Fo%20contrase%C3%B1a).%0A%0ANombre%20completo%3A%20%0AIdentificaci%C3%B3n%3A%20%0A%0AGracias.">castleblack.inc@gmail.com</a>
          · WhatsApp:
          <a class="help-link help-link--wa" href="https://wa.me/573209017438?text=Hola%20Castle%20Black.%0A%0ANecesito%20ayuda%20para%20recuperar%20el%20acceso%20al%20panel%20(olvid%C3%A9%20mi%20usuario%20y%2Fo%20contrase%C3%B1a).%0A%0ANombre%20completo%3A%20%0AIdentificaci%C3%B3n%3A%20%0A%0AGracias." target="_blank" rel="noopener">(+57) 320 901 7438</a>
        </p>
      </div>
    </section>
  </main>

  <footer>
    <p>© Castle Black 2026</p>
  </footer>

  <script src="data/users.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
